name: Test

on: [push, pull_request]

# Tests only read the repo; no write scopes needed
permissions:
  contents: read

concurrency:
  group: ${{ github.ref_name }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name != 'push' || github.ref_name == github.event.repository.default_branch
    strategy:
      fail-fast: false
      matrix:
        node_version: ["18", "20", "24"]
        java_version: ["8", "11", "17", "21", "25"]
        java_distrib: [temurin]
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - node_version: "18"
            java_version: "17"
            java_distrib: adopt
            os: ubuntu-latest
        exclude:
          # excludes node 8 on macOS
          - os: macos-latest
            java_version: "8"
    name: Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node_version }}
      - name: Install Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: ${{ matrix.java_distrib }}
          java-version: ${{ matrix.java_version }}
      - name: Install dependencies and link
        run: npm ci
      - name: Run tests
        env:
          DEBUG: java-caller,njre
        run: npm run test

  test-no-java:
    name: Test - No Java
    strategy:
      matrix:
        debian_version: [bookworm]
        node_version: ["18"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    container:
      image: "node:${{ matrix.node_version }}-${{ matrix.debian_version }}"
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install dependencies and link
        run: npm ci
      - name: Run tests
        env:
          DEBUG: "java-caller"
        run: npm run test
